site_name: 研究知识库
site_description: 四层研究生产系统：资料 → 知识 → 研究 → 成果
site_author: Research Team
site_url: https://lxz-123435.github.io/research-knowledge-base/

repo_url: https://github.com/lxz-123435/research-knowledge-base
repo_name: lxz-123435/research-knowledge-base

remote_branch: gh-pages

theme:
  name: material
  language: zh
  palette:
    primary: indigo
    accent: indigo
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - toc.integrate
    - tags

plugins:
  - search
  - bibtex:
      bib_file: references/references.bib
      cite_format: square

nav:
  - 首页: index.md
  
  - 01 资料素材:
    - 01_sources/index.md
    - 01_sources/books/index.md
    - 01_sources/papers/index.md
    - 01_sources/reports/index.md
    - 01_sources/organizations/index.md
    - 01_sources/policy/index.md
    - 01_sources/data/index.md
    - 01_sources/cases/index.md
    - 01_sources/reading_queue/index.md
  
  - 02 知识管理:
    - 02_knowledge/index.md
    - 02_knowledge/notes/index.md
    - 02_knowledge/concepts/index.md
    - 02_knowledge/frameworks/index.md
    - 02_knowledge/insights/index.md
  
  - 03 研究生产:
    - 03_research/index.md
    - 03_research/topics/index.md
    - 03_research/projects/index.md
    - 03_research/drafts/index.md
    - 03_research/frameworks/index.md
    - 03_research/questions/index.md
    - 03_research/models/index.md
    - 03_research/connections/index.md
    - 03_research/logs/index.md
  
  - 04 成果产出:
    - 04_outputs/index.md
    - 04_outputs/theory/index.md
    - 04_outputs/reports/index.md
    - 04_outputs/essays/index.md
  
  - 参考文献:
    - references/index.md
    - references/policy/index.md
    - references/reports/index.md

  - 权威资料:
    - 权威资料/权威资料.md
  - AI工具:
    - tools/ai-tools/index.md

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - toc:
      permalink: true

copyright: '研究知识库 &copy; 2026'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lxz-123435/research-knowledge-base
  tags: true
